name: Import Check and Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  import-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check imports
      run: |
        python -c "import data_manager; print('data_manager OK')"
        python -c "import utils.logging_config; print('utils.logging_config OK')"
        python -c "from utils.logging_config import setup_logging; print('setup_logging import OK')"

    - name: Run tests
      run: |
        # Assuming tests are in tests/ directory, adjust if needed
        if [ -d "tests" ]; then
          pip install pytest
          pytest tests/ -v
        else
          echo "No tests directory found, skipping pytest"
        fi