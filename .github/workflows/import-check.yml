name: Import Check and Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  import-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check imports
      run: |
        python -c "import data_manager; print('data_manager OK')"
        python -c "import utils.logging_config; print('utils.logging_config OK')"
        python -c "from utils.logging_config import setup_logging; print('setup_logging import OK')"

    - name: Run tests
      run: |
        # Assuming tests are in tests/ directory, adjust if needed
        if [ -d "tests" ]; then
          pip install pytest
          pytest tests/ -v
        else
          echo "No tests directory found, skipping pytest"
        fi

  integration-test:
    runs-on: ubuntu-latest
    needs: import-check

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start services
      run: |
        docker-compose up --build -d
        # Wait for Streamlit to start
        sleep 30

    - name: Run integration tests
      run: |
        # Check if container is running
        docker ps | grep football_intel_app
        # Simple health check via container logs or port
        docker exec football_intel_app python -c "import app; print('App imports OK')"
        echo "Integration test passed"

    - name: Stop services
      run: docker-compose down